name: Job Search Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"   # 07:00 Sydney time
    - cron: "0 2 * * *"    # 13:00 Sydney time

jobs:
  test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: List files
        run: ls -R .

      - name: Show preferences file
        run: cat preferences.txt

      - name: Run job search script
        run: python3 job_search.py
